services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE: http://localhost:8000/api
      VITE_WS_BASE: ws://localhost:8000
      VITE_DEV_AUTO_LOGIN: "true"
      VITE_DEV_AUTO_LOGIN_EMAIL: francis@mitsumidistribution.com
      VITE_DEV_AUTO_LOGIN_PASSWORD: Francis@2026
    depends_on:
      - api

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mongodb:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: mitsumi
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mitsumi"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
